# Render configuration for N8N automation service

# Specify type and name of the service
service:
  type: web
  name: n8n
  env: node

# Specify the build settings
build:
  type: npm
  command: install

# Specify deployment settings
deploy:
  command: start

# Specify environment variables
env:
  N8N_BASIC_AUTH_ACTIVE: "true"
  N8N_BASIC_AUTH_USER: "admin"
  N8N_BASIC_AUTH_PASSWORD: "password"

# Specify the region
region: oregon

# Define instance type and scaling rules
instance:
  type: small
  scale:
    min: 1
    max: 3

# Define next.js settings if applicable
next:
  enable: false

# Additional deployment settings
restart:
  policy: always
