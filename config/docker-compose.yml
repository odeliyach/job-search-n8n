version: '3.5'\n\nservices:\n  postgres:\n    image: postgres:13\n    restart: always\n    environment:\n      POSTGRES_DB: n8n\n      POSTGRES_USER: n8n\n      POSTGRES_PASSWORD: n8n_password\n    volumes:\n      - pgdata:/var/lib/postgresql/data\n\n  n8n:\n    image: n8nio/n8n\n    restart: always\n    environment:\n      DB_TYPE: postgres\n      DB_POSTGRESDB_HOST: postgres\n      DB_POSTGRESDB_PORT: 5432\n      DB_POSTGRESDB_DATABASE: n8n\n      DB_POSTGRESDB_USER: n8n\n      DB_POSTGRESDB_PASSWORD: n8n_password\n      N8N_HOST: "0.0.0.0"\n      N8N_PORT: 5678\n      N8N_PROTOCOL: 'http'\n      # Ollama integration settings can be added here as appropriate\n    depends_on:\n      - postgres\n    ports:\n      - "5678:5678"\n    volumes:\n      - n8n_data:/home/n8n/.n8n\n\nvolumes:\n  pgdata:\n  n8n_data: